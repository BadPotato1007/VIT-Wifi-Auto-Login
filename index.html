<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIT Wifi auto login Setup Generator</title>
  <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/BadPotato1007/VIT-Wifi-Auto-Login/refs/heads/main/icon.ico">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f4f6f8;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px 20px 80px 20px; 
      box-sizing: border-box;
    }
    .card {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      box-sizing: border-box;
    }
    h2 {
      margin-top: 0;
      color: #1a1a1a;
      font-size: 22px;
    }
    p {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
      font-size: 13px;
    }
    input[type="text"], input[type="password"], select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      background-color: #fff;
    }
    input:focus, select:focus {
      border-color: #0066cc;
    }
    button {
      width: 100%;
      background-color: #0066cc;
      color: white;
      border: none;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #0052a3;
    }
    .output-group {
      margin-top: 24px;
      display: none;
    }
    textarea {
      width: 100%;
      height: 110px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #f8f9fa;
      font-family: monospace;
      font-size: 12px;
      box-sizing: border-box;
      resize: none;
    }
    .copy-btn {
      background-color: #28a745;
      margin-top: 8px;
    }
    .copy-btn:hover {
      background-color: #218838;
    }

    .locked-bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background-color: #1a1a1a;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      box-sizing: border-box;
      z-index: 999;
      box-shadow: 0 -3px 12px rgba(0,0,0,0.15);
      font-size: 13px;
      text-align: center;
    }
    .locked-bottom-bar a {
      color: #3b82f6; 
    }
    
    .gay {
      width: 260px; 
      position: fixed;
      right: 20px; 
      top: 50%;
      transform: translateY(-50%); 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px; 
      padding: 20px;
      box-sizing: border-box; 
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      background-color: #ffffff;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .qr-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #333333;
      margin: 0;
      line-height: 1.4;
    }

    .qr-image {
      max-width: 100%;
      height: auto;
      display: block;
      width: 180px; 
    }

    @media (max-width: 1080px) {
      body {
        justify-content: flex-start;
        padding-top: 30px;
        padding-bottom: 90px;
      }

      .gay {
        position: relative;
        right: auto;
        top: auto;
        transform: none;
        width: 100%;
        max-width: 480px;
        margin-top: 20px;
      }
    }
  </style>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const btnGenerate = document.getElementById("btnGenerate");
      const btnCopy = document.getElementById("btnCopy");

      btnGenerate.addEventListener("click", generateCommand);
      btnCopy.addEventListener("click", copyCommand);
    });

    function generateCommand() {
      const platform = document.getElementById('platform').value;
      const reg = document.getElementById('reg').value.trim();
      const pass = document.getElementById('pass').value.trim();

      if (!reg || !pass) {
        alert('Please enter both your Registration Number and Password.');
        return;
      }

      const instructionSteps = document.getElementById('instructionSteps');

      if (platform === 'windows') {
        // --- WINDOWS POWERSHELL LOGIC ---
        const batContent = `@echo off\nsetlocal EnableDelayedExpansion\n\nset "APP_DIR=%APPDATA%\\ProntoAutoLogin"\nset "CRED_FILE=%APP_DIR%\\creds.dat"\n\nif not exist "%APP_DIR%" mkdir "%APP_DIR%"\n\nif not exist "%CRED_FILE%" (\n    (\n        echo REG:${reg}\n        echo PASS:${pass}\n    ) > "%CRED_FILE%"\n)\n\nfor /f "usebackq tokens=1,2 delims=:" %%A in ("%CRED_FILE%") do (\n    if "%%A"=="REG" set "USER_ID=%%B"\n    if "%%A"=="PASS" set "USER_PASS=%%B"\n)\n\n:MONITOR_LOOP\ntimeout /t 5 /nobreak >nul\n\ncall :GET_SSID CURRENT_SSID\nif "!CURRENT_SSID!"=="" goto MONITOR_LOOP\n\nfor /f "delims=" %%R in ('curl.exe -s -m 3 http://www.msftconnecttest.com/connecttest.txt 2^>nul') do set "TEST_RESPONSE=%%R"\n\nif not "!TEST_RESPONSE!"=="Microsoft Connect Test" (\n    timeout /t 2 /nobreak >nul\n    \n    curl.exe -s -k -X POST "http://phc.prontonetworks.com/cgi-bin/authlogin?URI=http://example.com" ^\n      -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" ^\n      -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" ^\n      -H "Content-Type: application/x-www-form-urlencoded" ^\n      -H "Origin: http://phc.prontonetworks.com" ^\n      -H "Referer: http://phc.prontonetworks.com/cgi-bin/authlogin?URI=http://www.msftconnecttest.com/redirect" ^\n      --data-urlencode "userId=!USER_ID!" ^\n      --data-urlencode "password=!USER_PASS!" ^\n      --data-urlencode "serviceName=ProntoAuthentication" >nul\n\n    timeout /t 3 /nobreak >nul\n)\n\ngoto MONITOR_LOOP\n\n:GET_SSID\nset "%~1="\nfor /f "tokens=2 delims=:" %%I in ('netsh wlan show interfaces ^| findstr /c:" SSID "') do (\n    set "RAW_SSID=%%I"\n    set "%~1=!RAW_SSID:~1!"\n)\nexit /b`;

        const vbsContent = 'CreateObject("WScript.Shell").Run """' + '%APPDATA%\\ProntoAutoLogin\\ProntoAutoLogin.bat""", 0, False';

        const batBase64 = btoa(unescape(encodeURIComponent(batContent)));
        const vbsBase64 = btoa(unescape(encodeURIComponent(vbsContent)));

        const psScript = `$dir = "$env:APPDATA\\ProntoAutoLogin"; $startup = [Environment]::GetFolderPath('Startup'); New-Item -ItemType Directory -Force -Path $dir | Out-Null; [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String('${batBase64}')) | Set-Content -Path "$dir\\ProntoAutoLogin.bat"; [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String('${vbsBase64}')) | Set-Content -Path "$startup\\SilentStart.vbs"; Start-Process wscript.exe -ArgumentList "\`"$startup\\SilentStart.vbs\`""; (New-Object -ComObject WScript.Shell).Popup("The VIT Wifi Auto Login software has been installed successfully.", 0, "VIT Auto Login", 64) | Out-Null`;

        let unicodeBytes = new Uint16Array(psScript.length);
        for (let i = 0; i < psScript.length; i++) {
          unicodeBytes[i] = psScript.charCodeAt(i);
        }
        let psBase64 = btoa(String.fromCharCode.apply(null, new Uint8Array(unicodeBytes.buffer)));

        document.getElementById('commandBox').value = `powershell -NoProfile -ExecutionPolicy Bypass -EncodedCommand ${psBase64}`;
        
        instructionSteps.innerHTML = `
          1. Click the <b>Copy Command</b> button.<br>
          2. Press <b>Win + R</b>, type <b>powershell</b>, and press Enter.<br>
          3. Paste the copied code into PowerShell and press Enter.<br>
          Enjoy auto-login!
        `;

      } else {
        // --- macOS TERMINAL / BASH LOGIC ---
const macScript = `mkdir -p ~/.vit_autologin
cat << 'EOF' > ~/.vit_autologin/auto_login.sh
#!/bin/bash
USER_ID="${reg}"
USER_PASS="${pass}"

while true; do
  TEST_RESPONSE=$(curl -s -m 3 http://www.msftconnecttest.com/connecttest.txt 2>/dev/null)
  if [ "$TEST_RESPONSE" != "Microsoft Connect Test" ]; then
    curl -s -k -X POST "http://phc.prontonetworks.com/cgi-bin/authlogin?URI=http://example.com" \\
      -H "User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)" \\
      -H "Content-Type: application/x-www-form-urlencoded" \\
      --data-urlencode "userId=$USER_ID" \\
      --data-urlencode "password=$USER_PASS" \\
      --data-urlencode "serviceName=ProntoAuthentication" > /dev/null
  fi
  sleep 5
done
EOF
chmod +x ~/.vit_autologin/auto_login.sh

mkdir -p ~/Library/LaunchAgents
cat << 'EOF' > ~/Library/LaunchAgents/com.vit.autologin.plist
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>Label</key>
    <string>com.vit.autologin</string>
    <key>ProgramArguments</key>
    <array>
        <string>/bin/bash</string>
        <string>\${HOME}/.vit_autologin/auto_login.sh</string>
    </array>
    <key>RunAtLoad</key>
    <true/>
    <key>KeepAlive</key>
    <true/>
</dict>
</plist>
EOF

launchctl unload ~/Library/LaunchAgents/com.vit.autologin.plist 2>/dev/null
launchctl load ~/Library/LaunchAgents/com.vit.autologin.plist
osascript -e 'display dialog "VIT Wifi Auto Login installed and started successfully on macOS!" buttons {"OK"} default button "OK"'
`;

        const macBase64 = btoa(unescape(encodeURIComponent(macScript)));
        document.getElementById('commandBox').value = `echo "${macBase64}" | base64 --decode | bash`;
        
        instructionSteps.innerHTML = `
          1. Click the <b>Copy Command</b> button.<br>
          2. Open <b>Terminal</b> on your Mac (Cmd + Space, type "Terminal").<br>
          3. Paste the command into Terminal and press Enter.<br>
          
        `;
      }

      document.getElementById('outputGroup').style.display = 'block';
    }

    function copyCommand() {
      const commandBox = document.getElementById('commandBox');
      commandBox.select();
      navigator.clipboard.writeText(commandBox.value).then(() => {
        alert('Command copied to clipboard!');
      }).catch(() => {
        document.execCommand('copy');
        alert('Command copied to clipboard!');
      });
    }
  </script>
</head>
<body>

<div class="card">
  <h2>VIT Wifi auto login Setup Generator</h2>

  <div class="form-group">
    <label for="platform">Operating System</label>
    <select id="platform">
      <option value="windows">Windows OS</option>
      <option value="macos">macOS (MacBook / iMac)</option>
    </select>
  </div>

  <div class="form-group">
    <label for="reg">Registration Number</label>
    <input type="text" id="reg" placeholder="e.g. 26BEC0037">
  </div>
  
  <div class="form-group">
    <label for="pass">Password</label>
    <input type="password" id="pass" placeholder="Enter password">
  </div>
  
  <button id="btnGenerate">Generate Setup Command</button>
  
  <div class="output-group" id="outputGroup">
    <label>Paste this command into your Terminal / PowerShell:</label>
    <textarea id="commandBox" readonly></textarea>
    <button class="copy-btn" id="btnCopy">Copy Command</button>
    <br><br>
    <b>Next Steps:</b><br>
    <span id="instructionSteps"></span>
  </div>
</div>

<div class="gay">
  <p class="qr-text">If this helped you out, consider sending me something!</p>
  <img src="https://i.ibb.co/tPL7Z56g/Screenshot-2026-07-22-113835.png" alt="QR Code" class="qr-image">
</div>

<div class="locked-bottom-bar">

</div>

</body>
</html>
